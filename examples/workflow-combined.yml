name: Lint

# Single-workflow alternative to the two separate config/sqf workflows.
# Runs both linters as parallel jobs. Pick this OR the split workflows,
# not both.

on:
  push:
    branches: [main]
    paths:
      - 'Addons/**'
      - 'tools/**'
      - '.github/workflows/lint.yml'
  pull_request:
    paths:
      - 'Addons/**'
      - 'tools/**'

jobs:
  config:
    name: Config files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: python3 tools/arma_lint.py Addons --no-warnings

  sqf:
    name: SQF scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: python3 tools/sqf_lint.py Addons --no-warnings
