name: SQF Lint

# Lints Arma 3 SQF script files (.sqf) on every push to main and on every PR
# that touches SQF or the linter itself. Edit the paths below if your script
# source lives somewhere other than Addons/.

on:
  push:
    branches: [main]
    paths:
      - 'Addons/**/*.sqf'
      - '.github/workflows/sqflint.yml'
      - 'tools/sqf_lint.py'
  pull_request:
    paths:
      - 'Addons/**/*.sqf'
      - 'tools/sqf_lint.py'

jobs:
  sqflint:
    name: Lint SQF files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      # Single Python file, stdlib only. No pip, no docker, no rust toolchain.
      #
      # --no-warnings hides warnings so they don't fail the build. Once your
      # existing warnings are cleaned up, swap --no-warnings for -W and CI
      # will start blocking on warnings too.
      - name: Run sqf_lint
        run: python3 tools/sqf_lint.py Addons --no-warnings
